<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Интерактивное меню кафе</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="top-bar">
    <h1 class="app-title">Меню кафе</h1>
    <div class="order-panel">
      <button
        id="orderToggleButton"
        class="order-counter order-toggle"
        type="button"
        aria-expanded="false"
        aria-controls="orderDropdown"
      >
        В заказе: <span id="orderCount">0</span>
      </button>

      <div id="orderDropdown" class="order-dropdown" hidden>
        <p class="order-dropdown-title">Добавленные блюда</p>
        <p id="orderEmptyMessage" class="order-empty-message">Пока ничего не добавлено.</p>
        <ul id="orderList" class="order-list"></ul>
        <div class="order-summary" aria-live="polite">
          <p class="order-summary-row">
            <span>Позиций</span>
            <strong id="orderItemsTotal">0</strong>
          </p>
          <p class="order-summary-row">
            <span>Сумма</span>
            <strong id="orderTotalPrice">0 RUB</strong>
          </p>
        </div>
        <button id="checkoutOrderButton" class="checkout-order-button" type="button">Оформить заказ</button>
        <button id="clearOrderButton" class="clear-order-button" type="button">Очистить заказ</button>
      </div>
    </div>
  </header>

  <main class="page">
    <div class="breadcrumbs">
      <span>Меню ресторана</span>
      <span>›</span>
      <span id="currentCategory">Все блюда</span>
    </div>

    <section class="filters" aria-label="Фильтры меню">
      <label class="search-field">
        <span>Поиск</span>
        <input id="searchInput" type="search" placeholder="Например: чизкейк">
      </label>

      <label>
        <span>Категория</span>
        <select id="categorySelect">
          <option value="all">Все блюда</option>
        </select>
      </label>

      <label>
        <span>Цена</span>
        <select id="priceSelect">
          <option value="all">Любая</option>
          <option value="cheap">До 150 RUB</option>
          <option value="middle">150–250 RUB</option>
          <option value="expensive">Дороже 250 RUB</option>
        </select>
      </label>

      <label>
        <span>Сортировка</span>
        <select id="sortSelect">
          <option value="default">По умолчанию</option>
          <option value="name-asc">Название А-Я</option>
          <option value="name-desc">Название Я-А</option>
          <option value="price-asc">Сначала дешевле</option>
          <option value="price-desc">Сначала дороже</option>
        </select>
      </label>
    </section>

    <p id="resultsCount" aria-live="polite" hidden></p>
    <section id="menuGrid" class="menu-grid" aria-label="Список блюд"></section>
    <p id="emptyMessage" class="empty-message">Ничего не найдено. Попробуйте изменить фильтры.</p>
  </main>

  <!-- Порядок важен: сначала данные, потом логика, потом работа со страницей. -->
  <script src="data.js"></script>
  <script src="logic.js"></script>
  <script src="ui.js"></script>
</body>
</html>
